<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <title>GWHS Arboretum</title>
        <link rel="stylesheet" href="css/styles.css" type="text/css">
    </head>
    <style>
        .sidenav {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 1;
        top: 0;
        left: 0;
        background-color: #004e1f;
        overflow-x: hidden;
        transition: 0.5s;
        padding-top: 60px;
        }

        .sidenav a {
        padding: 8px 8px 8px 32px;
        text-decoration: none;
        font-size: 25px;
        color: #b9b9b9;
        display: block;
        transition: 0.3s;
        }

        .sidenav a:hover {
        color: #f1f1f1;
        }

        .sidenav .closebtn {
        position: absolute;
        top: 0;
        right: 25px;
        font-size: 36px;
        margin-left: 50px;
        }
        @media screen and (max-height: 450px) {
        .sidenav {padding-top: 15px;}
        .sidenav a {font-size: 18px;}
        }
    </style>    
    <script>
        function openNav() {
            document.getElementById("side_nav").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("side_nav").style.width = "0";
        }
    </script>
    <body>
        <div id="side_nav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <a href="#">About</a>
            <a href="#">Trees</a>
            <a href="#">Contact Us</a>
        </div>
        <side_nav>
        <span onclick="openNav()">&#9776</span>
        </side_nav>
        <header>
            <h1>GWHS Arboretum</h1>
            <body>Run by the George Sustainability Club</body>
        </header>
    </body>
    
    <body>

            Here, you can find information about all the trees found around the GWHS campus!
        </main>

</html>
